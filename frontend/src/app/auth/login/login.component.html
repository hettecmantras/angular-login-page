<div class="login-wrapper">
  <div class="login-card">
    <header>
      <p class="eyebrow">Member access only</p>
      <h1>Sign in</h1>
      <p class="subtitle">Enter your credentials to continue to the dashboard.</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [class.invalid]="email?.invalid && (email?.dirty || email?.touched)"
          placeholder="you@example.com"
        />
        <small class="error" *ngIf="email?.dirty || email?.touched">
          <span *ngIf="email?.hasError('required')">Email is required.</span>
          <span *ngIf="email?.hasError('email')">Provide a valid email address.</span>
        </small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [class.invalid]="password?.invalid && (password?.dirty || password?.touched)"
          placeholder="Use at least 6 characters"
        />
        <small class="error" *ngIf="password?.dirty || password?.touched">
          <span *ngIf="password?.hasError('required')">Password is required.</span>
          <span *ngIf="password?.hasError('minlength')">Use six characters or more.</span>
        </small>
      </div>

      <button type="submit" [disabled]="submitting">
        {{ submitting ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p
      *ngIf="message"
      class="status-message"
      [class.success]="messageType === 'success'"
      [class.error]="messageType === 'error'"
    >
      {{ message }}
    </p>
  </div>
</div>
